spring:
  application:
    name: TP1_Guilda
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
#    Area de Procducap
    show-sql: true
    properties:
      hibernate:
        format_sql: true
#
  main:
    allow-bean-definition-overriding: true
  sql:
    init:
      mode: never



  elasticsearch:
    uris: http://localhost:9200